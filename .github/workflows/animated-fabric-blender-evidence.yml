name: Animated Fabric Blender evidence

on:
  push:
    paths:
      - "apps/animated-fabric/containers/blender/**"
      - "apps/animated-fabric/.dockerignore"
      - "apps/animated-fabric/tools/blender/**"
      - "apps/animated-fabric/scripts/**"
      - "apps/animated-fabric/tests/golden/LICENSE-AF052-CC0.md"
      - "apps/animated-fabric/tests/golden/af052_blender_walk.provenance.json"
      - "apps/animated-fabric/tests/golden/af052_blender_walk_*.png"
      - "apps/animated-fabric/tests/golden/LICENSE-AF055-CC0.md"
      - "apps/animated-fabric/tests/golden/af055_actor_fixture_neutral.png"
      - "apps/animated-fabric/tests/golden/af055_actor_fixture_neutral.provenance.json"
      - "apps/animated-fabric/tests/unit/test_actor_package.py"
      - "apps/animated-fabric/tests/unit/test_blender_*.py"
      - "apps/animated-fabric/tests/integration/test_blender_directional_demo_script.py"
      - "apps/animated-fabric/src/animated_fabric/domain/**"
      - "apps/animated-fabric/src/animated_fabric/infrastructure/exporters/**"
      - "apps/animated-fabric/Dockerfile"
      - "apps/animated-fabric/pyproject.toml"
      - "apps/animated-fabric/constraints/linux-py312.txt"
      - "apps/animated-fabric/compose.yaml"
      - "apps/animated-fabric/docs/AF053-DEMO-CC0.md"
      - "apps/animated-fabric/docs/LEGAL_INVENTORY.md"
      - "apps/animated-fabric/docs/SPEC.md"
      - "apps/animated-fabric/docs/decisions/0010-experimental-blender-prerender.md"
      - "apps/animated-fabric/docs/decisions/0011-grid-spritesheet-export.md"
      - "apps/animated-fabric/docs/decisions/0012-directional-yaw-prerender.md"
      - "apps/animated-fabric/docs/decisions/0013-end-to-end-directional-demo.md"
      - "apps/animated-fabric/docs/decisions/0014-reviewed-macaw-actor-bridge.md"
      - "apps/animated-fabric/docs/third-party/blender.md"
      - "docs/LEGAL_INVENTORY.md"
      - ".github/workflows/animated-fabric-blender-evidence.yml"
  pull_request:
    paths:
      - "apps/animated-fabric/containers/blender/**"
      - "apps/animated-fabric/.dockerignore"
      - "apps/animated-fabric/tools/blender/**"
      - "apps/animated-fabric/scripts/**"
      - "apps/animated-fabric/tests/golden/LICENSE-AF052-CC0.md"
      - "apps/animated-fabric/tests/golden/af052_blender_walk.provenance.json"
      - "apps/animated-fabric/tests/golden/af052_blender_walk_*.png"
      - "apps/animated-fabric/tests/golden/LICENSE-AF055-CC0.md"
      - "apps/animated-fabric/tests/golden/af055_actor_fixture_neutral.png"
      - "apps/animated-fabric/tests/golden/af055_actor_fixture_neutral.provenance.json"
      - "apps/animated-fabric/tests/unit/test_actor_package.py"
      - "apps/animated-fabric/tests/unit/test_blender_*.py"
      - "apps/animated-fabric/tests/integration/test_blender_directional_demo_script.py"
      - "apps/animated-fabric/src/animated_fabric/domain/**"
      - "apps/animated-fabric/src/animated_fabric/infrastructure/exporters/**"
      - "apps/animated-fabric/Dockerfile"
      - "apps/animated-fabric/pyproject.toml"
      - "apps/animated-fabric/constraints/linux-py312.txt"
      - "apps/animated-fabric/compose.yaml"
      - "apps/animated-fabric/docs/AF053-DEMO-CC0.md"
      - "apps/animated-fabric/docs/LEGAL_INVENTORY.md"
      - "apps/animated-fabric/docs/SPEC.md"
      - "apps/animated-fabric/docs/decisions/0010-experimental-blender-prerender.md"
      - "apps/animated-fabric/docs/decisions/0011-grid-spritesheet-export.md"
      - "apps/animated-fabric/docs/decisions/0012-directional-yaw-prerender.md"
      - "apps/animated-fabric/docs/decisions/0013-end-to-end-directional-demo.md"
      - "apps/animated-fabric/docs/decisions/0014-reviewed-macaw-actor-bridge.md"
      - "apps/animated-fabric/docs/third-party/blender.md"
      - "docs/LEGAL_INVENTORY.md"
      - ".github/workflows/animated-fabric-blender-evidence.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evidence:
    name: Native Linux end-to-end directional demo
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/animated-fabric
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Match container ownership to the Linux runner
        run: |
          echo "LOCAL_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "LOCAL_GID=$(id -g)" >> "$GITHUB_ENV"
          mkdir -p workspaces/blender

      - name: Validate the isolated profile
        run: docker compose --profile blender config --quiet

      - name: Build pinned development and Blender images
        run: |
          docker compose build animated-fabric-dev
          docker compose --profile blender build animated-fabric-blender
          docker image inspect caatuu-animated-fabric-blender:4.5.12-cycles-cpu \
            --format 'Blender evidence image ID: {{.Id}}'

      - name: Verify fixed version, architecture, and non-root identity
        run: |
          docker compose --profile blender run --rm --no-deps \
            --entrypoint /opt/blender/blender animated-fabric-blender --version
          worker_uid="$(docker compose --profile blender run --rm --no-deps \
            --entrypoint /usr/bin/id animated-fabric-blender -u)"
          echo "Blender worker UID: $worker_uid"
          test "$worker_uid" != "0"

      - name: Reject output escape before rendering
        run: |
          set +e
          docker compose --profile blender run --rm --no-deps \
            animated-fabric-blender --out /tmp/escape
          status=$?
          set -e
          test "$status" -eq 10
          test ! -e workspaces/blender/escape

      - name: Run the complete AF-053 demo once
        run: bash scripts/run_blender_directional_demo.sh --skip-build

      - name: Record first result and seed stale-output probes
        run: |
          set -Eeuo pipefail
          mkdir -p .tmp/af053-manifests
          manifest_tree() {
            root="$1"
            destination="$2"
            (
              cd "$root"
              find . -type f -print0 | LC_ALL=C sort -z | xargs -0 sha256sum
            ) > "$destination"
          }
          manifest_tree workspaces/blender/af053-demo .tmp/af053-manifests/evidence-first.sha256
          manifest_tree workspaces/blender/af053-product .tmp/af053-manifests/product-first.sha256
          manifest_tree \
            workspaces/blender/af053-demo-review \
            .tmp/af053-manifests/review-first.sha256
          touch workspaces/blender/af053-demo/stale-evidence.txt
          touch workspaces/blender/af053-product/stale-product.txt
          touch workspaces/blender/af053-demo-review/stale-review.txt

      - name: Rerun from scratch and prove deterministic replacement
        run: |
          set -Eeuo pipefail
          bash scripts/run_blender_directional_demo.sh --skip-build
          test ! -e workspaces/blender/af053-demo/stale-evidence.txt
          test ! -e workspaces/blender/af053-product/stale-product.txt
          test ! -e workspaces/blender/af053-demo-review/stale-review.txt
          manifest_tree() {
            root="$1"
            destination="$2"
            (
              cd "$root"
              find . -type f -print0 | LC_ALL=C sort -z | xargs -0 sha256sum
            ) > "$destination"
          }
          manifest_tree workspaces/blender/af053-demo .tmp/af053-manifests/evidence-second.sha256
          manifest_tree workspaces/blender/af053-product .tmp/af053-manifests/product-second.sha256
          manifest_tree \
            workspaces/blender/af053-demo-review \
            .tmp/af053-manifests/review-second.sha256
          cmp \
            .tmp/af053-manifests/evidence-first.sha256 \
            .tmp/af053-manifests/evidence-second.sha256
          cmp \
            .tmp/af053-manifests/product-first.sha256 \
            .tmp/af053-manifests/product-second.sha256
          cmp \
            .tmp/af053-manifests/review-first.sha256 \
            .tmp/af053-manifests/review-second.sha256

      - name: Report bounded result
        run: |
          set -Eeuo pipefail
          test "$(find workspaces/blender/af053-demo -mindepth 1 -maxdepth 1 \
            -printf '%f\n' | LC_ALL=C sort)" = \
            "$(printf '%s\n' directional-prerender.json provenance.json walk)"
          test "$(find workspaces/blender/af053-product -mindepth 1 -maxdepth 1 \
            -type f -printf '%f\n' | LC_ALL=C sort)" = \
            "$(printf '%s\n' walk.png walk.spritesheet.json)"
          test "$(find workspaces/blender/af053-demo-review -mindepth 1 -maxdepth 1 \
            -type f -printf '%f\n' | LC_ALL=C sort)" = \
            "$(printf '%s\n' walk_contact_sheet.png walk_review.gif)"
          cat .tmp/af053-manifests/evidence-second.sha256
          cat .tmp/af053-manifests/product-second.sha256
          cat .tmp/af053-manifests/review-second.sha256
          cat workspaces/blender/af053-demo/provenance.json
          cat workspaces/blender/af053-product/walk.spritesheet.json

      - name: Run focused pure-Python and host-orchestration contracts
        run: |
          docker compose run --rm --no-deps animated-fabric-dev \
            ruff format --check tools/blender scripts tests/unit/test_blender_motion.py \
            tests/unit/test_blender_output_paths.py tests/unit/test_blender_png_canonical.py \
            tests/unit/test_blender_walk_review.py \
            tests/integration/test_blender_directional_demo_script.py
          docker compose run --rm --no-deps animated-fabric-dev \
            ruff check tools/blender scripts tests/unit/test_blender_motion.py \
            tests/unit/test_blender_output_paths.py tests/unit/test_blender_png_canonical.py \
            tests/unit/test_blender_walk_review.py \
            tests/integration/test_blender_directional_demo_script.py
          docker compose run --rm --no-deps animated-fabric-dev \
            sh -c 'MYPYPATH=src mypy --strict \
            scripts/package_blender_directional_export.py \
            scripts/package_blender_walk_demo.py \
            scripts/generate_af052_directional_goldens.py \
            scripts/verify_blender_directional_goldens.py'
          docker compose run --rm --no-deps animated-fabric-dev \
            pytest -q --no-cov tests/unit/test_blender_motion.py \
            tests/unit/test_animation_export_models.py \
            tests/unit/test_blender_output_paths.py tests/unit/test_blender_png_canonical.py \
            tests/unit/test_blender_walk_review.py \
            tests/integration/test_blender_directional_demo_script.py \
            tests/integration/test_grid_spritesheet_exporter.py

      - name: Publish cleared AF-053 demo media and reports
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: animated-fabric-af053-demo-${{ github.sha }}
          path: |
            apps/animated-fabric/workspaces/blender/af053-product/walk.png
            apps/animated-fabric/workspaces/blender/af053-product/walk.spritesheet.json
            apps/animated-fabric/workspaces/blender/af053-demo-review/walk_contact_sheet.png
            apps/animated-fabric/workspaces/blender/af053-demo-review/walk_review.gif
            apps/animated-fabric/workspaces/blender/af053-demo/directional-prerender.json
            apps/animated-fabric/workspaces/blender/af053-demo/provenance.json
            apps/animated-fabric/docs/AF053-DEMO-CC0.md
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  actor-package-evidence:
    name: Native Linux AF-055 actor-package validation
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/animated-fabric
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Match container ownership to the Linux runner
        run: |
          echo "LOCAL_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "LOCAL_GID=$(id -g)" >> "$GITHUB_ENV"
          mkdir -p .tmp/af055-manifests workspaces/actor-packages workspaces/blender

      - name: Validate the isolated actor-package profile
        run: docker compose --profile blender-actor config --quiet

      - name: Build the authoritative development image
        run: docker compose build animated-fabric-dev

      - name: Generate the geometric fixture once
        run: |
          set -Eeuo pipefail
          docker compose run --rm --no-deps animated-fabric-dev \
            python scripts/generate_actor_package_fixture.py \
            --out workspaces/actor-packages/geometric-fixture-v1
          (
            cd workspaces/actor-packages/geometric-fixture-v1
            find . -type f -print0 | LC_ALL=C sort -z | xargs -0 sha256sum
          ) > .tmp/af055-manifests/package-first.sha256

      - name: Regenerate the fixture and prove deterministic replacement
        run: |
          set -Eeuo pipefail
          touch workspaces/actor-packages/geometric-fixture-v1/stale-package.txt
          docker compose run --rm --no-deps animated-fabric-dev \
            python scripts/generate_actor_package_fixture.py \
            --out workspaces/actor-packages/geometric-fixture-v1
          test ! -e workspaces/actor-packages/geometric-fixture-v1/stale-package.txt
          (
            cd workspaces/actor-packages/geometric-fixture-v1
            find . -type f -print0 | LC_ALL=C sort -z | xargs -0 sha256sum
          ) > .tmp/af055-manifests/package-second.sha256
          cmp \
            .tmp/af055-manifests/package-first.sha256 \
            .tmp/af055-manifests/package-second.sha256

      - name: Build the separate pinned actor validator
        run: |
          docker compose --profile blender-actor build animated-fabric-blender-actor-validator
          docker image inspect caatuu-animated-fabric-blender-actor-validator:4.5.12 \
            --format 'AF-055 actor-validator image ID: {{.Id}}'

      - name: Verify fixed version, architecture, and non-root identity
        run: |
          docker compose --profile blender-actor run --rm --no-deps \
            --entrypoint /opt/blender/blender \
            animated-fabric-blender-actor-validator --version
          worker_uid="$(docker compose --profile blender-actor run --rm --no-deps \
            --entrypoint /usr/bin/id animated-fabric-blender-actor-validator -u)"
          echo "AF-055 actor-validator UID: $worker_uid"
          test "$worker_uid" != "0"

      - name: Run the neutral actor validation once
        run: |
          set -Eeuo pipefail
          docker compose --profile blender-actor run --rm --no-deps \
            animated-fabric-blender-actor-validator
          (
            cd workspaces/blender/af055-neutral
            find . -type f -print0 | LC_ALL=C sort -z | xargs -0 sha256sum
          ) > .tmp/af055-manifests/neutral-first.sha256

      - name: Rerun neutral validation and prove deterministic replacement
        run: |
          set -Eeuo pipefail
          touch workspaces/blender/af055-neutral/stale-evidence.txt
          docker compose --profile blender-actor run --rm --no-deps \
            animated-fabric-blender-actor-validator
          test ! -e workspaces/blender/af055-neutral/stale-evidence.txt
          (
            cd workspaces/blender/af055-neutral
            find . -type f -print0 | LC_ALL=C sort -z | xargs -0 sha256sum
          ) > .tmp/af055-manifests/neutral-second.sha256
          cmp \
            .tmp/af055-manifests/neutral-first.sha256 \
            .tmp/af055-manifests/neutral-second.sha256

      - name: Verify bounded AF-055 evidence against the reviewed golden
        run: |
          set -Eeuo pipefail
          test "$(find workspaces/actor-packages/geometric-fixture-v1 \
            -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort)" = \
            "$(printf '%s\n' actor-package.json actor.glb textures)"
          test "$(find workspaces/blender/af055-neutral \
            -mindepth 1 -maxdepth 1 -type f -printf '%f\n' | LC_ALL=C sort)" = \
            "$(printf '%s\n' neutral.png validation.json)"
          docker compose run --rm --no-deps animated-fabric-dev \
            python scripts/verify_blender_actor_neutral.py \
            --source workspaces/blender/af055-neutral \
            --package workspaces/actor-packages/geometric-fixture-v1
          cat .tmp/af055-manifests/package-second.sha256
          cat .tmp/af055-manifests/neutral-second.sha256
          cat workspaces/blender/af055-neutral/validation.json

      - name: Run focused actor-package lint and tests
        run: |
          docker compose run --rm --no-deps animated-fabric-dev \
            ruff format --check tools/blender/actor_package.py \
            tools/blender/render_actor_package.py scripts/generate_actor_package_fixture.py \
            scripts/verify_blender_actor_neutral.py tests/unit/test_actor_package.py \
            tests/unit/test_blender_actor_neutral.py
          docker compose run --rm --no-deps animated-fabric-dev \
            ruff check tools/blender/actor_package.py tools/blender/render_actor_package.py \
            scripts/generate_actor_package_fixture.py \
            scripts/verify_blender_actor_neutral.py tests/unit/test_actor_package.py \
            tests/unit/test_blender_actor_neutral.py
          docker compose run --rm --no-deps animated-fabric-dev \
            sh -c 'MYPYPATH=src mypy --strict --explicit-package-bases \
            tools/blender/actor_package.py scripts/generate_actor_package_fixture.py \
            scripts/verify_blender_actor_neutral.py'
          docker compose run --rm --no-deps animated-fabric-dev \
            pytest -q --no-cov tests/unit/test_actor_package.py \
            tests/unit/test_blender_actor_neutral.py
