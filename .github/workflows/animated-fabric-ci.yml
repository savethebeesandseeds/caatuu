name: Animated Fabric CI

on:
  push:
    paths:
      - "apps/animated-fabric/**"
      - ".github/workflows/animated-fabric-ci.yml"
  pull_request:
    paths:
      - "apps/animated-fabric/**"
      - ".github/workflows/animated-fabric-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Linux container quality gate
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Match container ownership to the Linux runner
        run: |
          echo "LOCAL_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "LOCAL_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Validate Compose
        working-directory: apps/animated-fabric
        run: |
          docker compose config --quiet
          docker compose --profile gui --profile cutout-classic --profile cutout \
            --profile cutout-cuda --profile cutout-provision config --quiet

      - name: Build the authoritative Linux development image
        working-directory: apps/animated-fabric
        run: docker compose build animated-fabric-dev

      - name: Run the complete quality gate in Linux
        working-directory: apps/animated-fabric
        run: |
          docker compose run --rm --no-deps animated-fabric-dev ruff format --check .
          docker compose run --rm --no-deps animated-fabric-dev ruff check .
          docker compose run --rm --no-deps animated-fabric-dev mypy src
          docker compose run --rm --no-deps animated-fabric-dev pytest -q
          docker compose run --rm --no-deps animated-fabric-dev python -m pip check

      - name: Build and smoke-test the installable wheel
        working-directory: apps/animated-fabric
        run: |
          docker compose run --rm --no-deps animated-fabric-dev \
            python -m pip wheel --no-deps --no-build-isolation \
            --wheel-dir .tmp/wheels .
          docker compose run --rm --no-deps --workdir /tmp \
            animated-fabric-dev python -c \
            "from pathlib import Path; import sys; wheel = next(Path('/workspace/.tmp/wheels').glob('animated_fabric-*.whl')); sys.path.insert(0, str(wheel)); import animated_fabric; from animated_fabric.templates import JsonRigTemplateRegistry; assert str(wheel) in animated_fabric.__file__; assert JsonRigTemplateRegistry().get('humanoid_v1').template_id == 'humanoid_v1'"

      - name: Smoke-test the installed CLI and deterministic fixtures
        working-directory: apps/animated-fabric
        run: |
          docker compose run --rm --no-deps animated-fabric-dev python -m animated_fabric --help
          docker compose run --rm --no-deps animated-fabric-dev animated-fabric version
          docker compose run --rm --no-deps animated-fabric-dev python -m animated_fabric doctor
          docker compose run --rm --no-deps animated-fabric-dev python scripts/generate_fixture_assets.py --out .tmp/fixtures
          docker compose run --rm --no-deps animated-fabric-dev animated-fabric render-frame \
            .tmp/fixtures/stick_humanoid --direction SE --time-ms 0 \
            --out .tmp/cli-frame.png
          docker compose run --rm --no-deps animated-fabric-dev \
            python scripts/run_demo_pipeline.py --out .tmp/demo

      - name: Smoke-test the baked image without a checkout mount
        working-directory: apps/animated-fabric
        run: |
          docker run --rm --network none --read-only --tmpfs /tmp \
            --cap-drop ALL --security-opt no-new-privileges \
            caatuu-animated-fabric-dev:python3.12-bookworm \
            python -m animated_fabric --help
          docker run --rm --network none --read-only --tmpfs /tmp \
            --cap-drop ALL --security-opt no-new-privileges \
            caatuu-animated-fabric-dev:python3.12-bookworm \
            python -m animated_fabric doctor
          docker run --rm --network none --read-only --tmpfs /tmp \
            --cap-drop ALL --security-opt no-new-privileges \
            caatuu-animated-fabric-dev:python3.12-bookworm \
            python -c \
            "from animated_fabric.templates import JsonRigTemplateRegistry; assert JsonRigTemplateRegistry().get('humanoid_v1').template_id == 'humanoid_v1'"

      - name: Build and smoke-test the lightweight cutout image
        working-directory: apps/animated-fabric
        run: |
          docker compose --profile cutout-classic build animated-fabric-cutout-classic
          docker compose run --rm --no-deps animated-fabric-dev \
            mkdir -p workspaces/cutout/input workspaces/cutout/output
          docker compose run --rm --no-deps animated-fabric-dev \
            python scripts/generate_fixture_assets.py --out workspaces/cutout/input
          docker compose --profile cutout-classic run --rm --no-deps \
            animated-fabric-cutout-classic doctor
          docker compose --profile cutout-classic run --rm --no-deps \
            animated-fabric-cutout-classic models
          docker compose --profile cutout-classic run --rm --no-deps \
            animated-fabric-cutout-classic image \
            /input/stick_humanoid/source/layers/SE/head.png \
            /output/head.png --engine classic
          docker compose run --rm --no-deps animated-fabric-dev \
            test -s workspaces/cutout/output/head.png
