<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f5efe5">
    <title>Caatuu Czech</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/caatuu-czech-512.png">
    <link rel="apple-touch-icon" href="icons/caatuu-czech-512.png">
    <script>
      try {
        const storedTheme = localStorage.getItem("caatuu-czech.theme") || "dark";
        document.documentElement.dataset.theme = ["light", "dark"].includes(storedTheme) ? storedTheme : "dark";
      } catch (error) {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
    <script src="runtime.js?v=runtime-2"></script>
    <link rel="stylesheet" href="theme.css?v=theme-2">
    <link rel="stylesheet" href="app.css?v=shell-36">
    <link rel="stylesheet" href="home.css?v=home-11">
    <link rel="stylesheet" href="chrome.css?v=chrome-style-7">
  </head>
  <body class="setup-blocked">
    <div class="app-shell home-shell">
      <header class="app-header" data-caatuu-app-header></header>

      <main class="home-main">
        <section class="home-hero" aria-labelledby="homeTitle">
          <p class="home-kicker">Start</p>
          <h1 id="homeTitle">Caatuu Czech</h1>
          <div class="setup-visual" aria-hidden="true">
            <span class="setup-orbit setup-orbit-one"></span>
            <span class="setup-orbit setup-orbit-two"></span>
            <img class="stage-art" src="icons/caatuu-czech-512.png" data-setup-art-src="/assets/aliens/Czech_Macaw.png" alt="">
          </div>
          <section class="native-setup-card" id="nativeSetup" aria-labelledby="setupTitle" hidden>
            <div class="setup-head">
              <div>
                <p class="home-kicker">Local setup</p>
                <h2 id="setupTitle">Preparing Caatuu</h2>
              </div>
              <div class="setup-head-meta">
                <span class="setup-count" id="setupCount">0/3</span>
                <button class="setup-detail-link" id="setupDetailsToggle" type="button" aria-expanded="false" aria-controls="setupDetails">Details</button>
              </div>
            </div>
            <div class="setup-message-zone" aria-live="polite">
              <p class="setup-phase" id="setupPhase">Checking storage</p>
              <p class="setup-message" id="setupMessage">Checking local intelligence.</p>
            </div>
            <div class="setup-progress-meta">
              <span id="setupProgressText">0%</span>
              <span id="setupBytes">Waiting for files</span>
            </div>
            <div class="setup-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="setupProgress">
              <span id="setupProgressBar"></span>
            </div>
            <div class="setup-detail-grid" id="setupDetails">
              <div class="setup-artifacts" id="setupArtifacts" aria-label="Setup artifacts"></div>
              <section class="setup-log-panel" aria-labelledby="setupLogTitle">
                <h3 id="setupLogTitle">Events</h3>
                <ol class="setup-log" id="setupLog"></ol>
              </section>
            </div>
            <div class="setup-actions">
              <button class="setup-action" id="setupAction" type="button">Prepare Caatuu</button>
              <button class="setup-small-action" id="setupAbort" type="button" disabled>Abort</button>
            </div>
            <button class="setup-update-link" id="setupUpdate" type="button" hidden>Update App</button>
          </section>
        </section>
      </main>

      <footer class="app-footer">
        <a class="footer-brand" href="https://www.waajacu.com" rel="noopener">
          <img class="footer-logo" src="icons/caatuu-czech-512.png" alt="">
          <span>by Waajacu</span>
        </a>
      </footer>
    </div>

    <nav class="bottom-app-nav" aria-label="Caatuu Czech sections" data-caatuu-bottom-nav></nav>

    <script src="chrome.js?v=chrome-14"></script>
    <script src="setup.js?v=setup-9"></script>
    <script>
      window.CaatuuRuntime?.registerServiceWorker().catch(() => {});
    </script>
  </body>
</html>
