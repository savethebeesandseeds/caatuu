<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f5efe5">
    <title>Embedding Images - Caatuu Czech</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/caatuu-czech-512.png">
    <link rel="apple-touch-icon" href="icons/caatuu-czech-512.png">
    <script>
      try {
        const storedTheme = localStorage.getItem("caatuu-czech.theme") || "dark";
        document.documentElement.dataset.theme = ["light", "dark"].includes(storedTheme) ? storedTheme : "dark";
      } catch (error) {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
    <script src="runtime.js?v=runtime-8"></script>
    <link rel="stylesheet" href="theme.css?v=theme-2">
    <link rel="stylesheet" href="chrome.css?v=chrome-style-22">
    <link rel="stylesheet" href="embedding-images.css?v=embedding-images-5">
  </head>
  <body>
    <div class="embedding-images-page">
      <header class="app-header" data-caatuu-app-header data-embedding-images-title="Embedding Images"></header>

      <main class="embedding-images-main" aria-label="Embedding image debugger">
        <section class="embedding-images-panel" aria-labelledby="embeddingImagesTitle">
          <header class="embedding-images-head">
            <div>
              <p class="embedding-images-kicker">Developer</p>
              <h1 id="embeddingImagesTitle">Embedding images</h1>
            </div>
          </header>

          <form class="embedding-debug-tool embedding-images-tool" id="embeddingDebugForm">
            <label class="embedding-debug-field embedding-images-field" for="embeddingDebugText">
              <span>English prompt</span>
              <textarea id="embeddingDebugText" rows="3" spellcheck="false" placeholder="a macaw plays music">a macaw plays music</textarea>
            </label>
            <div class="embedding-debug-actions embedding-images-actions">
              <button class="embedding-debug-random" type="button" id="embeddingDebugRandom">Random</button>
              <button class="embedding-debug-run" type="submit" id="embeddingDebugRun">Search images</button>
              <span class="embedding-debug-status" id="embeddingDebugStatus" aria-live="polite">Ready</span>
            </div>
          </form>

          <div class="embedding-debug-results embedding-images-results" id="embeddingDebugResults" aria-live="polite"></div>
        </section>
      </main>

      <footer class="app-footer">
        <a class="footer-brand" href="https://www.waajacu.com/" rel="noopener">
          <img class="footer-logo" src="icons/caatuu-czech-512.png" alt="">
          <span>by Waajacu</span>
        </a>
      </footer>
    </div>

    <nav
      class="bottom-app-nav"
      aria-label="Caatuu Czech sections"
      data-caatuu-bottom-nav
      data-active-section="settings"
      data-settings-target="openSettings"
    ></nav>

    <div data-caatuu-settings-panel hidden></div>

    <script src="chrome.js?v=chrome-27"></script>
    <script src="maintenance-ui.js?v=maintenance-3"></script>
    <script type="module" src="embedding-images.js?v=embedding-images-1"></script>
  </body>
</html>
