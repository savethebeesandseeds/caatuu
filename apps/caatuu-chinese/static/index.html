<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Caatuu · Learning Modes</title>
  <link rel="stylesheet" href="app.css">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#2cc0ff">
  <link rel="icon" href="assets/icon-192.png">
</head>
<body class="mode-index">
  <header id="modeHeader" class="mode-header" aria-label="Learning modes">
    <div class="mode-header-title">Learning Mode</div>
    <nav class="mode-nav" aria-label="Select learning mode">
      <a class="mode-btn" href="challenge">Challenge</a>
      <a class="mode-btn" href="secuence">Secuence</a>
      <a class="mode-btn" href="writing">Writing</a>
    </nav>
  </header>

  <main class="mode-index-main">
    <section class="mode-index-card" aria-labelledby="modeIndexHeading">
      <h1 id="modeIndexHeading">Choose your mode</h1>
      <p>Start with Challenge mode, build in Secuence, or practice in Writing mode.</p>
      <div class="mode-index-actions" role="group" aria-label="Mode actions">
        <a class="mode-btn mode-btn-large" href="challenge">Open Challenge</a>
        <a class="mode-btn mode-btn-large" href="secuence">Open Secuence</a>
        <a class="mode-btn mode-btn-large" href="writing">Open Writing</a>
      </div>
    </section>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const bust = Date.now();
        navigator.serviceWorker
          .register(`./sw.js?v=${bust}`, { scope: './' })
          .catch(console.error);
      });
    }
  </script>
</body>
</html>
