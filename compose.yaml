name: caatuu

services:
  caatuu:
    build:
      context: .
      dockerfile: apps/runtime/tooling/Dockerfile
    image: caatuu-runtime:debian-latest
    container_name: caatuu
    working_dir: /workspace/apps/runtime
    environment:
      CAATUU_WORKSPACE_ROOT: /workspace
      BIND_ADDR: "0.0.0.0"
      PORT: "9172"
      AGENT_CONFIG_PATH: ./profiles/word_challenge.toml
      RUST_LOG: ${CAATUU_RUST_LOG:-info}
      ENABLE_ARCHIVED_CHINESE_API: ${CAATUU_ENABLE_ARCHIVED_CHINESE_API:-0}
      ENABLE_ANDROID_DEBUG_DOWNLOADS: ${CAATUU_ENABLE_ANDROID_DEBUG_DOWNLOADS:-0}
      ENABLE_BUG_REPORTS: ${CAATUU_ENABLE_BUG_REPORTS:-0}
    ports:
      - "127.0.0.1:8765:9172"
    volumes:
      - ./apps/languages/czech/static:/workspace/apps/languages/czech/static:ro
      - ./apps/launcher/static:/workspace/apps/launcher/static:ro
      - ./demos:/workspace/demos:ro
      - ./archive/caatuu-chinese/static:/workspace/archive/caatuu-chinese/static:ro
      - ./apps/runtime/profiles:/workspace/apps/runtime/profiles:ro
      - ./artifacts/android:/workspace/artifacts/android:ro
      - ./apps/android/tooling/termux-install-debug.sh:/workspace/apps/android/tooling/termux-install-debug.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:$${PORT:-9172}/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  caatuu-tunnel:
    image: caatuu-runtime:debian-latest
    container_name: caatuu-tunnel
    profiles:
      - tunnel
    depends_on:
      caatuu:
        condition: service_healthy
    volumes:
      - ./secrets/cloudflared-token:/run/secrets/cloudflared-token:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - bash
      - -lc
      - |
        set -Eeuo pipefail
        forward_pid=
        shared_forward_pid=
        tunnel_pid=
        cleanup() {
          [[ -z "$${forward_pid}" ]] || kill "$${forward_pid}" 2>/dev/null || true
          [[ -z "$${shared_forward_pid}" ]] || kill "$${shared_forward_pid}" 2>/dev/null || true
          [[ -z "$${tunnel_pid}" ]] || kill "$${tunnel_pid}" 2>/dev/null || true
        }
        trap cleanup EXIT INT TERM
        socat TCP-LISTEN:9172,reuseaddr,fork TCP:caatuu:9172 &
        forward_pid=$$!
        socat TCP-LISTEN:7979,reuseaddr,fork TCP:host.docker.internal:7979 &
        shared_forward_pid=$$!
        cloudflared tunnel --protocol http2 --no-autoupdate --loglevel info run --token-file /run/secrets/cloudflared-token &
        tunnel_pid=$$!
        wait -n "$${forward_pid}" "$${shared_forward_pid}" "$${tunnel_pid}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9172/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  caatuu-build:
    image: rust:1.96-bookworm
    profiles:
      - tools
    working_dir: /workspace/apps/runtime
    environment:
      CARGO_TARGET_DIR: /workspace/apps/runtime/target-linux
    volumes:
      - .:/workspace
      - caatuu-cargo-registry:/usr/local/cargo/registry
      - caatuu-cargo-git:/usr/local/cargo/git
    command: ["cargo", "build", "--release", "--locked"]

  caatuu-dev:
    build:
      context: ./tools/dev-container
      dockerfile: Dockerfile
    image: caatuu-dev:debian-latest
    container_name: caatuu-dev
    profiles:
      - dev
    working_dir: /workspace
    environment:
      HF_HOME: /workspace/tools/czech-ml/data/models/english-base/hf-cache
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - .:/workspace
      - caatuu-cargo-registry:/usr/local/cargo/registry
      - caatuu-cargo-git:/usr/local/cargo/git
      - caatuu-npm-cache:/root/.npm
      - caatuu-pip-cache:/root/.cache/pip
      - caatuu-android-sdk:/opt/android-sdk
      - caatuu-gradle-dist:/opt/gradle
      - caatuu-gradle-cache:/root/.gradle
    gpus: all
    stdin_open: true
    tty: true
    command: ["bash"]

volumes:
  caatuu-cargo-registry:
  caatuu-cargo-git:
  caatuu-npm-cache:
  caatuu-pip-cache:
  caatuu-android-sdk:
    name: caatuu-android-sdk
  caatuu-gradle-dist:
    name: caatuu-gradle-dist
  caatuu-gradle-cache:
    name: caatuu-gradle-cache
