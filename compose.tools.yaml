name: caatuu

services:
  caatuu-build:
    image: rust:1.96-bookworm
    profiles:
      - tools
    working_dir: /workspace/apps/caatuu-runtime
    environment:
      CARGO_TARGET_DIR: /workspace/apps/caatuu-runtime/target-linux
    volumes:
      - .:/workspace
      - caatuu-cargo-registry:/usr/local/cargo/registry
      - caatuu-cargo-git:/usr/local/cargo/git
    command: ["cargo", "build", "--release", "--locked"]

  caatuu-dev:
    build:
      context: ./tools/dev
      dockerfile: Dockerfile
    image: caatuu-dev:debian-latest
    container_name: caatuu-dev
    profiles:
      - dev
    working_dir: /workspace
    environment:
      HF_HOME: /workspace/tools/caatuu-cz-ml/data/models/english-base/hf-cache
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - .:/workspace
      - caatuu-cargo-registry:/usr/local/cargo/registry
      - caatuu-cargo-git:/usr/local/cargo/git
      - caatuu-npm-cache:/root/.npm
      - caatuu-pip-cache:/root/.cache/pip
      - caatuu-android-sdk:/opt/android-sdk
      - caatuu-gradle-dist:/opt/gradle
      - caatuu-gradle-cache:/root/.gradle
    gpus: all
    stdin_open: true
    tty: true
    command: ["bash"]

volumes:
  caatuu-cargo-registry:
  caatuu-cargo-git:
  caatuu-npm-cache:
  caatuu-pip-cache:
  caatuu-android-sdk:
    name: caatuu-android-sdk
  caatuu-gradle-dist:
    name: caatuu-gradle-dist
  caatuu-gradle-cache:
    name: caatuu-gradle-cache
